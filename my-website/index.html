<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 10px;
      animation: fade 2s ease-in-out;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    footer {
      margin-top: 40px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🚀 مرحبا بيك في موقعي 2026</h1>
  <p>موقع حديث، سريع، ومتجاوب 💻</p>

  <div class="card">
    <h2>👤 من أنا</h2>
    <p>مطور مبتدئ يتعلم البرمجة ويبني مشاريع قوية</p>
  </div>

  <div class="card">
    <h2>⚡ مهاراتي</h2>
    <p>HTML - CSS - JavaScript (قريباً 🚀)</p>
    <button onclick="alert('مرحبا بيك في مشاريعي!')">اضغط هنا</button>
  </div>

  <div class="card">
    <h2>📞 تواصل</h2>
    <p>قريباً سيتم إضافة روابط التواصل</p>
  </div>

  <footer>
    © 2026 - جميع الحقوق محفوظة
  </footer>

</div>

</body>
</html>
